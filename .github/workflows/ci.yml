name: iOS Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Test
        uses: sersoft-gmbh/xcodebuild-action@v3.2.0
        with:
          project: EPCollaboratif.xcodeproj
          scheme: EPCollaboratif
          destination: 'platform=iOS Simulator,name=iPhone 16'
          action: test
          result-bundle-path: 'TestResults/TestResults.xcresult'
          
      - uses: kishikawakatsumi/xcresulttool@v1.7.1
        with:
          path: TestResults/TestResults.xcresult
        if: success() || failure()

      - uses: yeosu0107/xcresulttool-test-results@v1.2.0
        with:
          xcresult-path: TestResults.xcresult
          output-md: test-summary.md
        if: success() || failure()
